<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rotating Coin Demo</title>
    
    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #060714;
            color: #E5E7EB;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4rem;
            padding: 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .content-area {
            flex: 1;
            max-width: 500px;
        }
        
        .coin-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #627EEA 0%, #14F195 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            color: #9CA3AF;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .btn {
            background: linear-gradient(135deg, #627EEA 0%, #4B6DD6 100%);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        /* 3D Coin Styles */
        .coin-container {
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }
        
        .coin-wrapper {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            will-change: transform;
        }
        
        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 50%;
        }
        
        .coin-edge {
            position: absolute;
            width: 26px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%) rotateY(90deg);
            background: #666;
            border-radius: 50%;
            transform-origin: center;
            z-index: -1;
        }
        
        @media (max-width: 768px) {
            .hero-section {
                flex-direction: column;
                gap: 2rem;
                padding: 2rem;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const RotatingCoin3D = ({ size = 260 }) => {
            const containerRef = React.useRef(null);
            const wrapperRef = React.useRef(null);

            React.useEffect(() => {
                let rotation = 0;
                let animationId;

                const animate = () => {
                    rotation += 0.5; // Speed of rotation
                    if (wrapperRef.current) {
                        wrapperRef.current.style.transform = `rotateY(${rotation}deg) translateY(${Math.sin(rotation * 0.01) * 5}px)`;
                    }
                    animationId = requestAnimationFrame(animate);
                };

                animate();

                return () => {
                    cancelAnimationFrame(animationId);
                };
            }, []);

            return (
                <div 
                    ref={containerRef}
                    style={{
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        perspective: '1000px',
                        width: `${size}px`,
                        height: `${size}px`
                    }}
                >
                    <div 
                        ref={wrapperRef}
                        style={{
                            width: `${size}px`,
                            height: `${size}px`,
                            position: 'relative',
                            transformStyle: 'preserve-3d',
                            transition: 'transform 0.3s ease',
                            willChange: 'transform'
                        }}
                    >
                        {/* Front Face */}
                        <img
                            src="/coin.png"
                            alt="Coin Front"
                            className="coin-face"
                            style={{
                                transform: `translateZ(${size * 0.05}px)`
                            }}
                        />
                        
                        {/* Back Face */}
                        <img
                            src="/coin.png"
                            alt="Coin Back"
                            className="coin-face"
                            style={{
                                transform: `rotateY(180deg) translateZ(${size * 0.05}px)`
                            }}
                        />
                        
                        {/* Edge (Thickness) */}
                        <div
                            className="coin-edge"
                            style={{
                                width: `${size * 0.1}px`
                            }}
                        />
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="hero-section">
                    <div className="content-area">
                        <h1>The Divine Shield of Wealth</h1>
                        <p>
                            Experience the future of digital asset protection with our premium 3D rotating coin animation.
                            Built with React, CSS 3D transforms, and smooth animations for a truly immersive experience.
                        </p>
                        <button className="btn">
                            Get Started
                        </button>
                    </div>
                    <div className="coin-area">
                        <RotatingCoin3D size={300} />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
